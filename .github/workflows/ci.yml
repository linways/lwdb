name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. a new push to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        # 22.x is the floor (node:sqlite needs >= 22.5); 24.x guards against drift.
        node-version: ['22.x', '24.x']
    name: lint + test (node ${{ matrix.node-version }})
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        # test:ci runs test files serially — the spawned-process suites
        # (daemon/MCP/CLI) flake when many child processes run concurrently.
        run: npm run test:ci
